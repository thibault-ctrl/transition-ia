<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dance!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
  }

  #dance-container {
    position: relative;
    width: 100%;
    max-width: 500px;
    aspect-ratio: 2000 / 2777;
    transition: transform 0.15s ease-out;
    transform-origin: center bottom;
  }

  #dance-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.05s step-end;
  }

  #photo1 { opacity: 1; }
  #photo2 { opacity: 0; }

  #dance-container.sway-left {
    transform: translateX(-8px) rotate(-1.2deg) scale(1.02);
  }
  #dance-container.sway-right {
    transform: translateX(8px) rotate(1.2deg) scale(1.02);
  }
  #dance-container.bounce {
    transform: translateY(-6px) scale(1.04);
  }

  .disco-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .disco-bg.active { opacity: 1; }

  .disco-light {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: discoMove 2s ease-in-out infinite alternate;
  }

  .disco-light:nth-child(1) {
    width: 300px; height: 300px;
    background: #ff006e;
    top: -50px; left: -50px;
    animation-duration: 2.5s;
  }
  .disco-light:nth-child(2) {
    width: 250px; height: 250px;
    background: #3a86ff;
    bottom: -30px; right: -30px;
    animation-duration: 3s;
    animation-delay: 0.5s;
  }
  .disco-light:nth-child(3) {
    width: 200px; height: 200px;
    background: #ffbe0b;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-duration: 1.8s;
    animation-delay: 1s;
  }

  @keyframes discoMove {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -20px) scale(1.2); }
  }

  #start-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #start-overlay .play-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 1.5s ease-in-out infinite;
  }

  #start-overlay .play-circle::after {
    content: '';
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 15px 0 15px 26px;
    border-color: transparent transparent transparent #fff;
    margin-left: 4px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  #mute-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 50;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    cursor: pointer;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<div class="disco-bg" id="discoBg">
  <div class="disco-light"></div>
  <div class="disco-light"></div>
  <div class="disco-light"></div>
</div>

<div id="dance-container">
  <img id="photo1" src="photo1.jpg" alt="Dance 1">
  <img id="photo2" src="photo2.jpg" alt="Dance 2">
</div>

<audio id="music" src="music.mp3" preload="auto" loop autoplay></audio>

<div id="start-overlay"><div class="play-circle"></div></div>

<button id="mute-btn" aria-label="Mute/Unmute">🔊</button>

<script>
  const photo1 = document.getElementById('photo1');
  const photo2 = document.getElementById('photo2');
  const music = document.getElementById('music');
  const discoBg = document.getElementById('discoBg');
  const container = document.getElementById('dance-container');

  let showFirst = true;
  let beatCount = 0;
  let musicStarted = false;
  const BPM = 105;
  const beatMs = (60 / BPM) * 1000;

  function doBeat() {
    beatCount++;
    showFirst = !showFirst;
    photo1.style.opacity = showFirst ? '1' : '0';
    photo2.style.opacity = showFirst ? '0' : '1';

    container.className = '';
    void container.offsetWidth;
    if (beatCount % 4 === 0) {
      container.classList.add('bounce');
    } else if (showFirst) {
      container.classList.add('sway-left');
    } else {
      container.classList.add('sway-right');
    }
  }

  // Start animation immediately
  discoBg.classList.add('active');
  setInterval(doBeat, beatMs / 2);

  const overlay = document.getElementById('start-overlay');

  // Try autoplay - if it works, hide overlay
  music.play().then(() => {
    musicStarted = true;
    overlay.style.display = 'none';
  }).catch(() => {
    // Autoplay blocked - show overlay, wait for tap
  });

  function startMusic() {
    if (musicStarted) return;
    music.play().then(() => {
      musicStarted = true;
      overlay.style.display = 'none';
    }).catch(() => {});
  }

  overlay.addEventListener('click', startMusic);
  overlay.addEventListener('touchend', function(e) {
    e.preventDefault();
    startMusic();
  });

  // Mute button
  const muteBtn = document.getElementById('mute-btn');
  muteBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    music.muted = !music.muted;
    muteBtn.textContent = music.muted ? '🔇' : '🔊';
  });
</script>
</body>
</html>
